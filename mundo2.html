<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo 2 — Médio</title>
    <link rel="stylesheet" href="estilos/medium.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <style>
        /* ─── ANIMAÇÕES DE CORAÇÃO ─── */
        @keyframes heartEntrar {
            0% {
                transform: scale(0) rotate(-25deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.35) rotate(8deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes heartPerder {
            0% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.4);
            }

            35% {
                transform: scale(0.8) rotate(-10deg);
                filter: grayscale(0);
            }

            60% {
                transform: scale(0.6) rotate(5deg);
                filter: grayscale(0.5);
            }

            100% {
                transform: scale(1);
                filter: grayscale(1);
                opacity: 0.3;
            }
        }

        @keyframes heartRestaurar {
            0% {
                transform: scale(0);
                opacity: 0;
                filter: grayscale(1);
            }

            50% {
                transform: scale(1.4);
                opacity: 1;
                filter: grayscale(0);
            }

            100% {
                transform: scale(1);
                opacity: 1;
                filter: grayscale(0);
            }
        }

        .coracao {
            display: inline-block;
            font-size: 1.4rem;
        }

        .coracao.animar-entrar {
            animation: heartEntrar 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .coracao.animar-perder {
            animation: heartPerder 0.6s ease-in-out both;
        }

        .coracao.animar-restaurar {
            animation: heartRestaurar 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .coracao.perdida {
            filter: grayscale(1);
            opacity: 0.3;
        }

        main {
            animation: telaEntrar 0.5s ease both;
        }

        @keyframes telaEntrar {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes flashErro {

            0%,
            100% {
                background-color: transparent;
            }

            50% {
                background-color: rgba(248, 113, 113, 0.12);
            }
        }

        body.erro-flash {
            animation: flashErro 0.4s ease;
        }

        /* ─── GRADE DE IMAGENS ─── */
        #contPerguntas.grade-imagens {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .opcao-imagem {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
        }

        .opcao-imagem:hover {
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
        }

        .opcao-imagem img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .opcao-imagem .nome-ave {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            padding: 6px 4px;
            letter-spacing: 0.08em;
        }

        .opcao-imagem.correta {
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .opcao-imagem.errada {
            border-color: #f87171;
            opacity: 0.5;
        }

        .opcao-imagem.desabilitada {
            cursor: default;
            pointer-events: none;
        }

        .video-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 9/16;
            max-height: 340px;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>

</head>

<body>
    <main>
        <span class="mundo-tag"
            style="color:white; background:rgb(247, 183, 49); border-color:rgb(247, 183, 49); text-shadow: 1px 1px 1px black;">⚡
            MUNDO 2 — MÉDIO</span>

        <div class="barra-container">
            <div class="barra-fill" id="barra" style="width: 0%; background: #fbbf24;"></div>
        </div>

        <p class="contador" id="contador">PERGUNTA 1 DE 5</p>

        <div class="video-container" id="videoContainer" style="display:none;"></div>

        <h1 id="textoPergunta"></h1>

        <div class="vidas-container">
            <span id="coracoes"></span>
        </div>

        <div id="contPerguntas"></div>
    </main>

    <script src="js/vida.js"></script>
    <script src="js/perguntas.js"></script>
    <script src="js/shuffle.js"></script>
    <script>
        const perguntasEmbaralhadas = shuffle(perguntas.mundo2);
        let indicePergunta = 0;
        const total = perguntasEmbaralhadas.length;

        function renderCoracoes(animTipo) {
            const cont = document.getElementById('coracoes');
            cont.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const span = document.createElement('span');
                const perdida = i >= vida;
                span.className = 'coracao' + (perdida ? ' perdida' : '');
                span.textContent = '❤️';
                span.style.animationDelay = (i * 0.08) + 's';
                if (!perdida && animTipo === 'entrar') {
                    span.classList.add('animar-entrar');
                } else if (perdida && animTipo === 'perder' && i === vida) {
                    span.classList.remove('perdida');
                    span.classList.add('animar-perder');
                    span.style.animationDelay = '0s';
                    setTimeout(function () { span.classList.add('perdida'); }, 600);
                } else if (!perdida && animTipo === 'restaurar') {
                    span.classList.add('animar-restaurar');
                }
                cont.appendChild(span);
            }
        }

        function avancar() {
            document.getElementById('videoContainer').innerHTML = '';
            document.getElementById('videoContainer').style.display = 'none';
            indicePergunta++;
            if (indicePergunta < total) {
                mostrarPergunta();
            } else {
                vida = 3;
                localStorage.setItem('vida', 3);
                renderCoracoes('restaurar');
                setTimeout(function () {
                    window.location.href = 'transicao.html?para=mundo3.html&mundo=3';
                }, 1000);
            }
        }

        function mostrarPergunta() {
            if (total === 0) {
                document.getElementById('textoPergunta').innerHTML = 'PERGUNTAS DO MUNDO 2 AINDA NÃO FORAM ADICIONADAS.';
                return;
            }

            const atual = perguntasEmbaralhadas[indicePergunta];
            document.getElementById('textoPergunta').innerHTML = atual.pergunta;
            document.getElementById('contador').innerHTML =
                'PERGUNTA ' + (indicePergunta + 1) + ' DE ' + total;
            document.getElementById('barra').style.width =
                (indicePergunta / total * 100) + '%';

            const container = document.getElementById('contPerguntas');
            container.innerHTML = '';

            if (atual.tipo === 'imagem') {
                document.getElementById('videoContainer').style.display = 'none';
                container.classList.add('grade-imagens');

                const opcoesComIndice = atual.opcoes.map(function (op, i) {
                    return { imagem: op.imagem, nome: op.nome, indiceOriginal: i };
                });
                const opcoesEmbaralhadas = shuffle(opcoesComIndice);

                opcoesEmbaralhadas.forEach(function (opcao) {
                    const div = document.createElement('div');
                    div.className = 'opcao-imagem';

                    const img = document.createElement('img');
                    img.src = opcao.imagem; img.alt = opcao.nome;

                    const nome = document.createElement('div');
                    nome.className = 'nome-ave';
                    nome.textContent = opcao.nome;

                    div.appendChild(img); div.appendChild(nome);

                    if (opcao.indiceOriginal === atual.resposta) {
                        div.onclick = function () {
                            div.classList.add('correta');
                            document.querySelectorAll('.opcao-imagem').forEach(function (d) {
                                d.classList.add('desabilitada');
                            });
                            setTimeout(avancar, 800);
                        };
                    } else {
                        div.onclick = function () {
                            div.classList.add('errada');
                            perdeVida();
                        };
                    }
                    container.appendChild(div);
                });

            } else if (atual.tipo === 'video') {
                container.classList.remove('grade-imagens');
                const videoContainer = document.getElementById('videoContainer');
                videoContainer.style.display = 'block';
                videoContainer.innerHTML =
                    '<iframe src="https://www.youtube.com/embed/' + atual.videoId +
                    '?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';

                atual.opcoes.forEach(function (opcao, indice) {
                    const botao = document.createElement('button');
                    botao.className = 'pergunta'; botao.type = 'button';
                    botao.innerHTML = opcao;
                    if (indice === atual.resposta) {
                        botao.onclick = function () {
                            botao.classList.add('correta');
                            desabilitarBotoes();
                            setTimeout(avancar, 600);
                        };
                    } else {
                        botao.onclick = function () {
                            botao.classList.add('errada');
                            perdeVida();
                        };
                    }
                    container.appendChild(botao);
                });

            } else {
                document.getElementById('videoContainer').style.display = 'none';
                container.classList.remove('grade-imagens');

                atual.opcoes.forEach(function (opcao, indice) {
                    const botao = document.createElement('button');
                    botao.className = 'pergunta'; botao.type = 'button';
                    botao.innerHTML = opcao;
                    if (indice === atual.resposta) {
                        botao.onclick = function () {
                            botao.classList.add('correta');
                            desabilitarBotoes();
                            setTimeout(avancar, 600);
                        };
                    } else {
                        botao.onclick = function () {
                            botao.classList.add('errada');
                            perdeVida();
                        };
                    }
                    container.appendChild(botao);
                });
            }
        }

        function desabilitarBotoes() {
            document.querySelectorAll('.pergunta').forEach(function (b) {
                b.onclick = null; b.style.opacity = '0.5';
            });
        }

        function perdeVida() {
            vida--;
            localStorage.setItem('vida', vida);
            renderCoracoes('perder');
            document.body.classList.remove('erro-flash');
            void document.body.offsetWidth;
            document.body.classList.add('erro-flash');
            if (vida <= 0) {
                setTimeout(function () { window.location.href = 'main.html'; }, 900);
            }
        }

        renderCoracoes('entrar');
        mostrarPergunta();

    </script>
</body>

</html>
