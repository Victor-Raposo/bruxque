<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Brusque</title>
    <link rel="stylesheet" href="estilos/main.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <style>
        main {
            animation: fadeInUp 0.6s ease both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body.saindo main {
            animation: fadeOutUp 0.45s ease both;
        }

        @keyframes fadeOutUp {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }
    </style>
</head>

<body>
    <main>
        <p class="subtitulo">BEM-VINDO AO</p>
        <h1 class="titulo-principal">QUIZ<br><span>BRUSQUE</span></h1>

        <p class="subtitulo">ESCOLHA O NÍVEL PARA COMEÇAR</p>

        <div id="contPerguntas" style="margin-top: 1rem;">
            <button class="btn-mundo btn-facil" onclick="iniciarJogo('mundo1.html')">
                🌱 MUNDO 1 — FÁCIL
            </button>
            <button class="btn-mundo btn-medio" onclick="iniciarJogo('mundo2.html')">
                ⚡ MUNDO 2 — MÉDIO
            </button>
            <button class="btn-mundo btn-dificil" onclick="iniciarJogo('mundo3.html')">
                🔥 MUNDO 3 — DIFÍCIL
            </button>
        </div>

        </div>

        <script>
            const nome = localStorage.getItem('jogador_nome');
            const escola = localStorage.getItem('jogador_escola');
            if (!nome || !escola) {
                window.location.href = 'cadastro.html';
            }
            function iniciarJogo(destino) {
                localStorage.setItem('vida', 3);
                document.body.classList.add('saindo');
                setTimeout(function () { window.location.href = destino; }, 450);
            }

        </script>
    </main>
</body>

</html>
